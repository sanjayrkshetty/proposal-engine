services:

  # ============================================================
  # DFIR — Digital Forensics & Incident Response
  # ============================================================

  DFIR-R-ESS:
    code: DFIR-R-ESS
    name: DFIR Retainer — Essential
    bu: dfir
    sub_bu: retainer
    tier: Essential
    template: retainer_essential.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{YEAR}-{REGION}-{SEQ:04d}"
    default_validity_days: 30
    sla_tier: "Initial Response: 4h | Containment: 24h | Report: 5 BD"
    description: Pre-contracted priority access to Proposal Engine forensic experts. Essential tier covers standard IR events with guaranteed 4-hour response SLA.
    key_components:
      - Pre-contracted expert access (up to 80 hours/year)
      - 4-hour priority incident response SLA
      - Standby forensics team (GCFA, GCIH certified)
      - Monthly threat intelligence briefing
      - Quarterly retainer review
    engagement_type: retainer
    typical_duration: 12 months (minimum 3 months)
    deliverables:
      - Retainer agreement with defined SLAs
      - Incident response playbook
      - Quarterly readiness reviews
      - On-demand forensic investigation hours (up to 80/year)
    regulatory_fit:
      - PCI DSS v4.0 (Requirement 12.10)
      - ISO/IEC 27001 (A.16)
      - RBI Cyber Security Framework
      - CERT-In 6-hour reporting compliance

  DFIR-R-ENT:
    code: DFIR-R-ENT
    name: DFIR Retainer — Enterprise
    bu: dfir
    sub_bu: retainer
    tier: Enterprise
    template: retainer_enterprise.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{YEAR}-{REGION}-{SEQ:04d}"
    default_validity_days: 30
    sla_tier: "Initial Response: 2h | Containment: 12h | Report: 3 BD"
    description: Enterprise-grade DFIR retainer with dedicated team, 2-hour response SLA, and unlimited IR events (fair use).
    key_components:
      - Dedicated forensic team (named resources)
      - 2-hour priority response SLA
      - Unlimited IR events (fair use policy)
      - PFI expertise for payment environments
      - Monthly tabletop exercises
      - Threat hunting hours (20/quarter)
    engagement_type: retainer
    typical_duration: 12 months (minimum 6 months)
    deliverables:
      - Retainer agreement + named team allocation
      - Incident response playbook (customised)
      - Monthly readiness reviews
      - Unlimited on-demand forensic hours (fair use)
      - Quarterly threat hunting reports
    regulatory_fit:
      - PCI DSS v4.0 (Requirement 12.10)
      - ISO/IEC 27001 (A.16)
      - RBI Cyber Security Framework
      - SEBI Cybersecurity and Cyber Resilience Framework
      - CERT-In 6-hour reporting compliance

  DFIR-R-ELT:
    code: DFIR-R-ELT
    name: DFIR Retainer — Elite
    bu: dfir
    sub_bu: retainer
    tier: Elite
    template: retainer_elite.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{YEAR}-{REGION}-{SEQ:04d}"
    default_validity_days: 30
    sla_tier: "Initial Response: 1h | Containment: 6h | Report: 2 BD"
    description: Elite DFIR retainer with 1-hour response SLA, on-call senior forensic director, and full PFI coverage.
    key_components:
      - Senior Forensic Director on call (named)
      - 1-hour response SLA (24/7/365)
      - Full PFI coverage for payment incidents
      - Proactive threat hunting (40 hours/quarter)
      - Executive-level crisis communication support
      - Board-ready incident reporting
    engagement_type: retainer
    typical_duration: 12 months (minimum 12 months)
    deliverables:
      - Elite retainer agreement + senior named resources
      - Bespoke IR playbook per business unit
      - Weekly readiness reviews
      - Unlimited on-demand hours
      - Quarterly executive threat briefings
      - Board-level incident communication templates
    regulatory_fit:
      - PCI DSS v4.0 (full PFI coverage)
      - ISO/IEC 27001
      - RBI, SEBI, IRDAI frameworks
      - DORA (EU digital operational resilience)
      - CERT-In 6-hour reporting compliance

  IFI:
    code: IFI
    name: Internal Forensic Investigation
    bu: dfir
    sub_bu: investigation
    tier: Standard
    template: ifi.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{BU}-{YEAR}-{SEQ:04d}"
    default_validity_days: 21
    sla_tier: "Report: 5-10 BD post evidence collection"
    description: Thorough investigation of complex or high-impact internal incidents including insider threats, breaches, and ransomware.
    key_components:
      - Deep system and memory forensics
      - Log analysis and correlation (SIEM integration)
      - Attack chain reconstruction
      - Data examination and classification
      - Regulatory-ready reporting (CERT-In, PCI DSS)
    engagement_type: project
    typical_duration: 2-6 weeks
    deliverables:
      - Executive summary report
      - Technical forensic findings report
      - Attack timeline reconstruction
      - Evidence chain of custody documentation
      - Remediation recommendations
    regulatory_fit:
      - PCI DSS breach notification (Requirement 12.10.7)
      - CERT-In 6-hour reporting
      - ISO/IEC 27001 incident management
      - DPDP Act 2023 data breach reporting

  CA:
    code: CA
    name: Compromise Assessment
    bu: dfir
    sub_bu: assessment
    tier: Standard
    template: ca.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{BU}-{YEAR}-{SEQ:04d}"
    default_validity_days: 21
    sla_tier: "Report: 3-5 BD post assessment"
    description: Proactive identification of hidden breaches, lateral movement, and undetected threat actor presence.
    key_components:
      - Hidden breach detection
      - Lateral movement identification
      - Environmental threat scanning (EDR + SIEM)
      - Endpoint forensic triage (up to 50 endpoints)
      - IOC discovery and threat actor correlation
    engagement_type: project
    typical_duration: 1-3 weeks
    deliverables:
      - Compromise assessment report
      - IOC list and threat actor TTPs (MITRE ATT&CK mapped)
      - Risk prioritisation matrix
      - Remediation roadmap
    regulatory_fit:
      - PCI DSS post-breach assessment
      - ISO/IEC 27001 continuous improvement
      - Cyber insurance requirements
      - DPDP Act 2023

  BAS:
    code: BAS
    name: Breach and Attack Simulation
    bu: dfir
    sub_bu: simulation
    tier: Standard
    template: bas.md
    questionnaire_module: bu.dfir.questionnaire
    codebook_path: bu/dfir/codebook.yaml
    proposal_number_format: "Proposal Engine-{BU}-{YEAR}-{SEQ:04d}"
    default_validity_days: 21
    sla_tier: "Report: 5 BD post simulation"
    description: MITRE ATT&CK-mapped simulated attacks to validate defenses and assess security control maturity.
    key_components:
      - Simulated attack execution (MITRE ATT&CK framework)
      - Defense gap identification across SIEM, EDR, WAF, DLP
      - Security maturity scoring (1-5 scale)
      - Purple team exercises (joint attacker/defender)
      - Control validation and detection coverage mapping
    engagement_type: project
    typical_duration: 2-4 weeks
    deliverables:
      - BAS execution report
      - MITRE ATT&CK coverage heatmap
      - Security maturity score with benchmarking
      - Control gap analysis and prioritised remediation plan
    regulatory_fit:
      - PCI DSS v4.0 (penetration testing requirements)
      - ISO/IEC 27001 (security testing)
      - DORA (financial sector resilience testing)
      - SEBI cybersecurity framework

